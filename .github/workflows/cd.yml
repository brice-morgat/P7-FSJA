name: Deploiement Continu

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publication des images Docker
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))

    steps:
      - name: Recuperer le code source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Generer les noms et tags d'image
        id: image
        shell: bash
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          SOURCE_REF: ${{ github.event_name == 'workflow_run' && format('refs/heads/{0}', github.event.workflow_run.head_branch) || github.ref }}
        run: |
          owner_repo="${GITHUB_REPOSITORY,,}"
          sha_tag="sha-${SOURCE_SHA}"
          back_image="ghcr.io/${owner_repo}/microcrm-back"
          front_image="ghcr.io/${owner_repo}/microcrm-front"
          back_tags="${back_image}:${sha_tag}"
          front_tags="${front_image}:${sha_tag}"

          if [[ "${SOURCE_REF}" == "refs/heads/main" ]]; then
            back_tags="${back_tags}"$'\n'"${back_image}:latest"
            front_tags="${front_tags}"$'\n'"${front_image}:latest"
          fi

          {
            echo "back_image=${back_image}"
            echo "front_image=${front_image}"
            echo "sha_tag=${sha_tag}"
            echo "back_tags<<EOF"
            echo "${back_tags}"
            echo "EOF"
            echo "front_tags<<EOF"
            echo "${front_tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Se connecter au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire et publier l'image back-end
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./back/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.back_tags }}

      - name: Construire et publier l'image front-end
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./front/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.front_tags }}
