name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  backend:
    name: Back-end
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Rendre le Gradle Wrapper exécutable
        run: chmod +x ./gradlew

      - name: Exécuter les tests back-end
        run: ./gradlew test

      - name: Construire le back-end
        run: ./gradlew build

  frontend:
    name: Front-end
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer les dépendances front-end
        run: npm ci

      - name: Construire le front-end
        run: npm run build

      - name: Exécuter les tests front-end
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox

  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Exécuter l'analyse SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
