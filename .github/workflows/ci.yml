name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  backend:
    name: Back-end
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: back

    steps:
      - name: Recuperer le code source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Installer Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Rendre le Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Executer les tests back-end
        run: ./gradlew test

      - name: Construire le back-end
        run: ./gradlew build

  frontend:
    name: Front-end
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front

    steps:
      - name: Recuperer le code source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Installer Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installer les dependances front-end
        run: npm ci

      - name: Construire le front-end
        run: npm run build

      - name: Executer les tests front-end
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox

  sonarqube:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Recuperer le code source
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Executer l'analyse SonarQube Cloud
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.2.1
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Ignorer SonarQube sans token
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "SONAR_TOKEN absent: analyse SonarQube ignoree."
